# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: api-agent
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false           # path to a Secret File, or the raw JSON string           # set manually — Sheets API key for reading Doc links
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAX_UPLOAD_FILES
        value: "10"
